<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanika - Csavarás Vizualizáció</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { background-color: #ffffff; border: 2px solid #e2e8f0; cursor: crosshair; }
        input[type=number]:focus { border-color: #4f46e5; outline: none; ring: 2px; ring-color: #818cf8; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans text-slate-900">

<div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
    <div class="bg-indigo-950 p-6 text-white text-center">
        <h1 class="text-3xl font-black tracking-tighter italic">MECHANIKA II. - CSAVARÁS</h1>
        <p class="text-indigo-300 text-sm font-medium mt-1 uppercase tracking-widest">Prizmatikus rudak ellenőrzője (Bánki Kar)</p>
    </div>

    <div class="p-6 grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <section class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 shadow-sm">
                <label class="block text-xs font-black text-indigo-400 mb-3 uppercase tracking-wider">Keresztmetszet Kiválasztása</label>
                <select id="type" onchange="updateUI()" class="w-full p-3 border-2 border-indigo-200 rounded-xl bg-white font-bold text-slate-700 focus:border-indigo-500 transition-all">
                    <option value="kor">Kör szelvény</option>
                    <option value="gyuru">Vastagfalú gyűrű</option>
                    <option value="teglalap">Téglalap (Saint-Venant)</option>
                    <option value="nyitott">Vékonyfalú nyitott (U, L, I)</option>
                    <option value="zart">Vékonyfalú zárt (Bredt)</option>
                </select>
            </section>

            <section class="bg-white p-5 rounded-2xl border border-slate-200 space-y-4 shadow-sm">
                <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-widest border-b pb-2">Geometriai Adatok [mm]</h3>
                <div id="div-D" class="space-y-1"><label class="text-xs font-bold text-slate-600 italic">Külső átmérő (D):</label><input type="number" id="D" class="w-full p-2 bg-slate-50 border rounded-lg" value="60" oninput="calculate()"></div>
                <div id="div-d" class="hidden space-y-1"><label class="text-xs font-bold text-slate-600 italic">Belső átmérő (d):</label><input type="number" id="d" class="w-full p-2 bg-slate-50 border rounded-lg" value="40" oninput="calculate()"></div>
                <div id="div-a" class="hidden space-y-1"><label class="text-xs font-bold text-slate-600 italic">Oldal 'b' (hosszabb):</label><input type="number" id="a_val" class="w-full p-2 bg-slate-50 border rounded-lg" value="80" oninput="calculate()"></div>
                <div id="div-b" class="hidden space-y-1"><label class="text-xs font-bold text-slate-600 italic">Oldal 'a' (rövidebb):</label><input type="number" id="b_val" class="w-full p-2 bg-slate-50 border rounded-lg" value="40" oninput="calculate()"></div>
                <div id="div-t" class="hidden space-y-1"><label class="text-xs font-bold text-slate-600 italic">Falvastagság (t):</label><input type="number" id="t_val" class="w-full p-2 bg-slate-50 border rounded-lg" value="3" oninput="calculate()"></div>
                <div id="div-Am" class="hidden space-y-1"><label class="text-xs font-bold text-indigo-600 italic uppercase tracking-tighter">Középvonal területe (Am):</label><input type="number" id="Am_val" class="w-full p-2 bg-indigo-50 border-2 border-indigo-200 rounded-lg font-bold" value="2400" oninput="calculate()"></div>
            </section>

            <section class="bg-slate-900 p-5 rounded-2xl text-white space-y-4">
                <div class="flex justify-between items-center"><label class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Nyomaték (Mt):</label><span id="Mt_val" class="font-mono text-indigo-400 font-bold">500 Nm</span></div>
                <input type="range" id="Mt" min="10" max="3000" value="500" oninput="calculate()" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <div class="text-[9px] text-slate-500 uppercase font-bold">G [GPa] <input type="number" id="G" class="w-full bg-slate-800 border-none p-1 rounded text-white text-xs mt-1" value="80" oninput="calculate()"></div>
                    <div class="text-[9px] text-slate-500 uppercase font-bold">L [mm] <input type="number" id="L" class="w-full bg-slate-800 border-none p-1 rounded text-white text-xs mt-1" value="1000" oninput="calculate()"></div>
                </div>
            </section>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div class="flex flex-col space-y-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Feszültségeloszlás ábra</span>
                    <canvas id="canvas" width="400" height="400" class="w-full h-auto aspect-square rounded-3xl shadow-inner"></canvas>
                </div>

                <div class="flex flex-col space-y-4 justify-center">
                    <div class="p-6 bg-white border-2 border-slate-100 rounded-3xl shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-2 bg-indigo-100 text-indigo-600 text-[9px] font-black uppercase">Max Feszültség</div>
                        <p id="outTau" class="text-5xl font-mono font-black text-slate-800 leading-tight">-</p>
                        <p class="text-sm font-bold text-slate-400">MPa (N/mm²)</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm font-mono uppercase tracking-tighter">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                            <span class="text-[9px] text-slate-400 block mb-1 font-sans">Inercia (It) [mm⁴]</span>
                            <span id="outIt" class="font-bold text-slate-700">-</span>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                            <span class="text-[9px] text-slate-400 block mb-1 font-sans">Szögelford. (φ) [°]</span>
                            <span id="outPhi" class="font-bold text-indigo-600">-</span>
                        </div>
                    </div>

                    <div id="theoryNote" class="p-5 bg-amber-50 rounded-2xl border-l-8 border-amber-400 text-xs text-amber-900 leading-relaxed font-medium italic">
                        Válasszon keresztmetszetet és adjon meg adatokat a számításhoz.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function updateUI() {
    const type = document.getElementById('type').value;
    const divs = ['div-D', 'div-d', 'div-a', 'div-b', 'div-t', 'div-Am'];
    divs.forEach(d => document.getElementById(d).classList.add('hidden'));

    if (type === 'kor') document.getElementById('div-D').classList.remove('hidden');
    if (type === 'gyuru') { document.getElementById('div-D').classList.remove('hidden'); document.getElementById('div-d').classList.remove('hidden'); }
    if (type === 'teglalap') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-b').classList.remove('hidden'); }
    if (type === 'nyitott') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }
    if (type === 'zart') { document.getElementById('div-Am').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }
    
    calculate();
}

function drawShape(type, D, d, a, b, t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 3;

    if (type === 'kor' || type === 'gyuru') {
        ctx.beginPath(); ctx.arc(cx, cy, 100, 0, Math.PI * 2); ctx.stroke();
        if (type === 'gyuru') { ctx.beginPath(); ctx.arc(cx, cy, 100 * (d/D), 0, Math.PI * 2); ctx.stroke(); }
        // Feszültség nyilak
        ctx.strokeStyle = '#f43f5e';
        for(let i=0; i<8; i++){
            let ang = i * Math.PI/4;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(ang)*80, cy + Math.sin(ang)*80);
            ctx.lineTo(cx + Math.cos(ang)*110, cy + Math.sin(ang)*110);
            ctx.stroke();
        }
    } else if (type === 'teglalap') {
        let scale = 180 / Math.max(a, b);
        ctx.strokeRect(cx - (b*scale)/2, cy - (a*scale)/2, b*scale, a*scale);
        ctx.fillStyle = '#f43f5e';
        ctx.beginPath(); ctx.arc(cx, cy - (a*scale)/2, 6, 0, 7); ctx.fill(); // Max pont
    } else if (type === 'nyitott') {
        ctx.beginPath(); ctx.moveTo(cx-80, cy-50); ctx.lineTo(cx+80, cy-50); ctx.lineTo(cx+80, cy+50); ctx.stroke();
        ctx.strokeStyle = '#f43f5e'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
    } else if (type === 'zart') {
        ctx.strokeRect(cx-80, cy-80, 160, 160);
        ctx.strokeStyle = '#f43f5e'; ctx.strokeRect(cx-75, cy-75, 150, 150);
    }
}

function calculate() {
    const type = document.getElementById('type').value;
    const Mt_val = document.getElementById('Mt').value;
    document.getElementById('Mt_val').innerText = Mt_val + " Nm";
    const Mt = Mt_val * 1000;
    const G = parseFloat(document.getElementById('G').value) * 1000;
    const L = parseFloat(document.getElementById('L').value);

    let It, Wt, note;

    if (type === 'kor') {
        const D = parseFloat(document.getElementById('D').value);
        It = (Math.PI * Math.pow(D, 4)) / 32;
        Wt = (Math.PI * Math.pow(D, 3)) / 16;
        note = "Kör rúd: Saint-Venant féle lineáris feszültségeloszlás (τ_max = Mt/Wp).";
        drawShape('kor', D);
    } else if (type === 'gyuru') {
        const D = parseFloat(document.getElementById('D').value);
        const d = parseFloat(document.getElementById('d').value);
        It = (Math.PI * (Math.pow(D, 4) - Math.pow(d, 4))) / 32;
        Wt = It / (D/2);
        note = "Vastagfalú gyűrű: Poláris inercianyomaték számítása Ip = (D⁴-d⁴)π/32.";
        drawShape('gyuru', D, d);
    } else if (type === 'teglalap') {
        const b = parseFloat(document.getElementById('a_val').value);
        const a = parseFloat(document.getElementById('b_val').value);
        let alpha = 0.208, beta = 0.141; // b/a = 1 default
        let r = b/a;
        if(r >= 10) { alpha = 0.312; beta = 0.312; }
        else if(r >= 2) { alpha = 0.246; beta = 0.229; }
        It = beta * b * Math.pow(a, 3);
        Wt = alpha * b * Math.pow(a, 2);
        note = "Téglalap: A maximális feszültség a hosszabb oldal (b) felezőpontjában ébred.";
        drawShape('teglalap', 0, 0, a, b);
    } else if (type === 'nyitott') {
        const b = parseFloat(document.getElementById('a_val').value);
        const t = parseFloat(document.getElementById('t_val').value);
        It = (b * Math.pow(t, 3)) / 3;
        Wt = It / t;
        note = "Nyitott szelvény: A torziós merevség (It) a falvastagság harmadik hatványával arányos.";
        drawShape('nyitott');
    } else if (type === 'zart') {
        const Am = parseFloat(document.getElementById('Am_val').value);
        const t = parseFloat(document.getElementById('t_val').value);
        Wt = 2 * Am * t;
        It = (4 * Math.pow(Am, 2) * t) / (4 * Math.sqrt(Am)); // Egyszerűsített It
        note = "Bredt-képlet: Zárt szelvényben állandó nyírófolyam (q) alakul ki. Nagyságrendekkel merevebb a nyitottnál.";
        drawShape('zart');
    }

    const tau = Mt / Wt;
    const phi = (Mt * L / (G * It)) * (180 / Math.PI);

    document.getElementById('outTau').innerText = tau.toFixed(2);
    document.getElementById('outIt').innerText = Math.round(It).toLocaleString('hu-HU');
    document.getElementById('outWt').innerText = Math.round(Wt).toLocaleString('hu-HU');
    document.getElementById('outPhi').innerText = phi.toFixed(4) + "°";
    document.getElementById('theoryNote').innerText = note;
}

// Kezdő indítás
window.onload = updateUI;
</script>
</body>
</html>
