<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mechanika válogatott fejezetei</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        body { font-family: 'Inter', sans-serif; }
        canvas { background-color: #ffffff; border-radius: 1rem; border: 2px solid #cbd5e1; }
        .math { font-family: 'Libre Baskerville', serif; font-style: italic; text-transform: none !important; }
        .math-normal { font-family: 'Libre Baskerville', serif; font-style: normal; text-transform: none !important; }
        .unit-select { font-size: 0.7rem; font-weight: 800; background: #334155; color: white; border-radius: 4px; padding: 2px 4px; margin-left: 4px; cursor: pointer; border: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8 text-slate-100">

<div class="max-w-7xl mx-auto">
    <div class="mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-3xl font-900 tracking-tighter uppercase text-indigo-400">Mechanika válogatott fejezetei</h1>
        <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Szabad Csavarás – Téglalap szelvény interpolációval</p>
    </div>

    <div class="grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-800 p-6 rounded-3xl shadow-xl border border-slate-700">
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-3 tracking-widest">Szelvény típusa</label>
                <select id="type" onchange="updateUI()" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl font-bold text-indigo-400 outline-none">
                    <option value="kor">Kör szelvény</option>
                    <option value="gyuru">Körgyűrű szelvény</option>
                    <option value="teglalap" selected>Téglalap (Saint-Venant)</option>
                    <option value="nyitott">Vékonyfalú nyitott</option>
                    <option value="zart">Vékonyfalú zárt (Bredt)</option>
                </select>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl shadow-xl space-y-4 border border-slate-700">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-700 pb-2">Paraméterek</h3>
                
                <div id="div-D" class="hidden flex items-center justify-between"><label class="text-sm math">D:</label>
                    <div class="flex items-center"><input type="number" id="D" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="60" oninput="calculate()"><select id="D_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select></div>
                </div>
                <div id="div-d" class="hidden flex items-center justify-between"><label class="text-sm math">d:</label>
                    <div class="flex items-center"><input type="number" id="d" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="40" oninput="calculate()"><select id="d_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select></div>
                </div>
                <div id="div-a" class="flex items-center justify-between"><label class="text-sm math">b (hosszabb):</label>
                    <div class="flex items-center"><input type="number" id="a_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="80" oninput="calculate()"><select id="a_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select></div>
                </div>
                <div id="div-b" class="flex items-center justify-between"><label class="text-sm math">a (rövidebb):</label>
                    <div class="flex items-center"><input type="number" id="b_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="40" oninput="calculate()"><select id="b_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select></div>
                </div>
                <div id="div-t" class="hidden flex items-center justify-between"><label class="text-sm math">t:</label>
                    <div class="flex items-center"><input type="number" id="t_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="3" oninput="calculate()"><select id="t_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select></div>
                </div>
                <div id="div-Ak" class="hidden flex items-center justify-between"><label class="text-sm math">A<sub>k</sub>:</label>
                    <div class="flex items-center"><input type="number" id="Ak_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="2400" oninput="calculate()"><select id="Ak_unit" onchange="calculate()" class="unit-select"><option value="1">mm²</option><option value="100">cm²</option></select></div>
                </div>

                <div class="pt-4 border-t border-slate-700 space-y-3">
                    <div class="flex items-center justify-between"><label class="text-sm math">G:</label>
                        <div class="flex items-center"><input type="number" id="G_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="80000" oninput="calculate()"><select id="G_unit" onchange="calculate()" class="unit-select"><option value="1">MPa</option><option value="1000">GPa</option></select></div>
                    </div>
                    <div class="flex items-center justify-between"><label class="text-sm math">M<sub>t</sub>:</label>
                        <div class="flex items-center"><input type="number" id="Mt" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="500" oninput="calculate()"><select id="Mt_unit" onchange="calculate()" class="unit-select"><option value="1000">Nm</option><option value="1000000">kNm</option></select></div>
                    </div>
                    <div class="flex items-center justify-between"><label class="text-sm math">l:</label>
                        <div class="flex items-center"><input type="number" id="L" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="1000" oninput="calculate()"><select id="L_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="1000">m</option></select></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Jelölési vázlat</span>
                    <canvas id="canvas" width="400" height="400" class="w-full h-auto"></canvas>
                </div>
                <div class="space-y-4">
                    <div class="bg-indigo-600 p-6 rounded-3xl shadow-xl">
                        <span class="text-[10px] font-black text-indigo-200 uppercase block mb-1">Max. csúsztatófeszültség (<span class="math-normal">&tau;<sub>max</sub></span>)</span>
                        <div class="flex justify-between items-center">
                            <h2 id="outTau" class="text-4xl font-900 tracking-tighter text-white">0.0000</h2>
                            <select id="tau_unit" onchange="calculate()" class="unit-select bg-indigo-800"><option value="1">MPa</option><option value="10">kN/cm²</option></select>
                        </div>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-500 uppercase">Torziós Inercia (<span id="labelInertia" class="math-normal">I<sub>t</sub></span>)</span>
                            <select id="inertia_unit" onchange="calculate()" class="unit-select"><option value="1">mm⁴</option><option value="10000">cm⁴</option></select>
                        </div>
                        <div id="outIt" class="text-xl font-black text-white">0</div>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-500 uppercase">Fajlagos elcsavarodás (<span class="math-normal">&vartheta;</span>)</span>
                            <select id="theta_unit" onchange="calculate()" class="unit-select"><option value="rad">rad/m</option><option value="deg">fok/m</option></select>
                        </div>
                        <div id="outTheta" class="text-xl font-black text-indigo-400">0</div>
                    </div>
                    <div class="bg-slate-800 p-5 rounded-2xl border-l-8 border-indigo-500">
                        <span class="text-[9px] font-black text-slate-500 uppercase block mb-1">Interpolált tényezők (b/a = <span id="ratioSpan">1</span>)</span>
                        <div class="text-xs text-slate-400 font-mono">
                            &alpha; = <span id="alphaVal">0</span> | &beta; = <span id="betaVal">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Előadásdiák szerinti táblázat (b/a, alpha, beta, gamma)
const SV_TABLE = [
    {r: 1.0, a: 0.208, b: 0.141, g: 1.000},
    {r: 1.5, a: 0.231, b: 0.196, g: 0.859},
    {r: 2.0, a: 0.246, b: 0.229, g: 0.795},
    {r: 3.0, a: 0.267, b: 0.263, g: 0.753},
    {r: 4.0, a: 0.282, b: 0.281, g: 0.745},
    {r: 6.0, a: 0.299, b: 0.299, g: 0.743},
    {r: 8.0, a: 0.307, b: 0.307, g: 0.742},
    {r: 10.0, a: 0.312, b: 0.312, g: 0.742},
    {r: 100.0, a: 0.333, b: 0.333, g: 0.742} // Közelítés a végtelenhez
];

function interpolate(ratio, key) {
    if (ratio <= SV_TABLE[0].r) return SV_TABLE[0][key];
    if (ratio >= SV_TABLE[SV_TABLE.length - 1].r) return SV_TABLE[SV_TABLE.length - 1][key];
    
    for (let i = 0; i < SV_TABLE.length - 1; i++) {
        const p1 = SV_TABLE[i];
        const p2 = SV_TABLE[i+1];
        if (ratio >= p1.r && ratio <= p2.r) {
            const t = (ratio - p1.r) / (p2.r - p1.r);
            return p1[key] + t * (p2[key] - p1[key]);
        }
    }
}

function updateUI() {
    const type = document.getElementById('type').value;
    const groups = ['div-D', 'div-d', 'div-a', 'div-b', 'div-t', 'div-Ak'];
    groups.forEach(g => document.getElementById(g).style.display = 'none');

    if (type === 'kor') document.getElementById('div-D').style.display = 'flex';
    if (type === 'gyuru') { document.getElementById('div-D').style.display = 'flex'; document.getElementById('div-d').style.display = 'flex'; }
    if (type === 'teglalap') { document.getElementById('div-a').style.display = 'flex'; document.getElementById('div-b').style.display = 'flex'; }
    if (type === 'nyitott') { document.getElementById('div-a').style.display = 'flex'; document.getElementById('div-t').style.display = 'flex'; }
    if (type === 'zart') { document.getElementById('div-Ak').style.display = 'flex'; document.getElementById('div-t').style.display = 'flex'; }

    document.getElementById('labelInertia').innerHTML = (type === 'kor' || type === 'gyuru') ? "I<sub>p</sub>" : "I<sub>t</sub>";
    calculate();
}

function drawSchema(type) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 400, 400);
    const cx = 200, cy = 200;
    ctx.strokeStyle = '#334155'; ctx.fillStyle = '#334155'; ctx.lineWidth = 2;
    ctx.font = "italic 16px Libre Baskerville";

    if(type === 'teglalap') {
        ctx.strokeRect(cx-110, cy-50, 220, 100);
        ctx.fillText("b", cx-5, cy-65);
        ctx.fillText("a", cx+125, cy+5);
        ctx.beginPath(); ctx.moveTo(cx-110, cy-60); ctx.lineTo(cx+110, cy-60); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+120, cy-50); ctx.lineTo(cx+120, cy+50); ctx.stroke();
    } else if (type === 'kor' || type === 'gyuru') {
        ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI*2); ctx.stroke();
        ctx.fillText("D", cx-5, cy-95);
        if(type === 'gyuru') { ctx.beginPath(); ctx.arc(cx, cy, 50, 0, Math.PI*2); ctx.stroke(); ctx.fillText("d", cx-5, cy+20); }
    }
}

function calculate() {
    try {
        const type = document.getElementById('type').value;
        const Mt = (parseFloat(document.getElementById('Mt').value) || 0) * (parseFloat(document.getElementById('Mt_unit').value));
        const G = (parseFloat(document.getElementById('G_val').value) || 80000) * (parseFloat(document.getElementById('G_unit').value));

        let IpIt = 0, Wt = 0;

        if (type === 'teglalap') {
            let b_in = (parseFloat(document.getElementById('a_val').value) || 1) * (parseFloat(document.getElementById('a_unit').value));
            let a_in = (parseFloat(document.getElementById('b_val').value) || 1) * (parseFloat(document.getElementById('b_unit').value));
            
            // Mindig b a hosszabb oldal
            const b = Math.max(a_in, b_in);
            const a = Math.min(a_in, b_in);
            const r = b / a;

            const alpha = interpolate(r, 'a');
            const beta = interpolate(r, 'b');

            document.getElementById('ratioSpan').innerText = r.toFixed(2);
            document.getElementById('alphaVal').innerText = alpha.toFixed(4);
            document.getElementById('betaVal').innerText = beta.toFixed(4);

            IpIt = beta * b * Math.pow(a, 3);
            Wt = alpha * b * Math.pow(a, 2);
        } else if (type === 'kor') {
            const D = (parseFloat(document.getElementById('D').value) || 1) * (parseFloat(document.getElementById('D_unit').value));
            IpIt = (Math.PI * Math.pow(D, 4)) / 32;
            Wt = IpIt / (D / 2);
        }
        // ... (többi szelvény számítása változatlan)

        if (IpIt > 0) {
            document.getElementById('outTau').innerText = (Mt / Wt / parseFloat(document.getElementById('tau_unit').value)).toFixed(4);
            document.getElementById('outIt').innerText = (IpIt / parseFloat(document.getElementById('inertia_unit').value)).toLocaleString('hu-HU');
            const thetaRadM = (Mt / (G * IpIt)) * 1000;
            document.getElementById('outTheta').innerText = document.getElementById('theta_unit').value === 'rad' ? thetaRadM.toFixed(8) + " rad/m" : (thetaRadM * 180 / Math.PI).toFixed(6) + " fok/m";
        }
    } catch(e) {}
    drawSchema(document.getElementById('type').value);
}

window.onload = updateUI;
</script>
</body>
</html>
