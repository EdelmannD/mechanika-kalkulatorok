<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mechanika válogatott fejezetei</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        canvas { background-color: #f8fafc; border-radius: 1rem; border: 2px solid #e2e8f0; }
        * { font-style: normal !important; }
        .unit-select { font-size: 0.7rem; font-weight: 700; background: #334155; color: white; border-radius: 4px; padding: 1px 4px; margin-left: 4px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8 text-slate-100">

<div class="max-w-7xl mx-auto">
    <div class="mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-900 tracking-tighter uppercase text-indigo-400">Mechanika válogatott fejezetei</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Prizmatikus rudak szabad csavarása</p>
        </div>
    </div>

    <div class="grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Szelvény Kiválasztása</label>
                <select id="type" onchange="updateUI()" class="w-full p-4 bg-slate-900 border-2 border-slate-700 rounded-2xl font-bold text-indigo-400 focus:border-indigo-500 outline-none">
                    <option value="kor">Kör szelvény</option>
                    <option value="gyuru">Körgyűrű szelvény</option>
                    <option value="teglalap">Téglalap (Saint-Venant)</option>
                    <option value="nyitott">Vékonyfalú nyitott</option>
                    <option value="zart">Vékonyfalú zárt (Bredt)</option>
                </select>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-700 pb-2 mb-4">Geometriai adatok</h3>
                
                <div id="div-D" class="flex items-center justify-between">
                    <label id="label-D" class="text-xs font-bold uppercase">D:</label>
                    <div class="flex items-center">
                        <input type="number" id="D" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="60" oninput="calculate()">
                        <select id="D_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>

                <div id="div-d" class="hidden flex items-center justify-between">
                    <label class="text-xs font-bold uppercase">d:</label>
                    <div class="flex items-center">
                        <input type="number" id="d" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="40" oninput="calculate()">
                        <select id="d_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>

                <div id="div-a" class="hidden flex items-center justify-between">
                    <label class="text-xs font-bold uppercase">b (hosszabb):</label>
                    <div class="flex items-center">
                        <input type="number" id="a_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="80" oninput="calculate()">
                        <select id="a_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>

                <div id="div-b" class="hidden flex items-center justify-between">
                    <label class="text-xs font-bold uppercase">a (rövidebb):</label>
                    <div class="flex items-center">
                        <input type="number" id="b_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="40" oninput="calculate()">
                        <select id="b_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>

                <div id="div-t" class="hidden flex items-center justify-between">
                    <label class="text-xs font-bold uppercase">t:</label>
                    <div class="flex items-center">
                        <input type="number" id="t_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="3" oninput="calculate()">
                        <select id="t_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>

                <div id="div-Am" class="hidden flex items-center justify-between">
                    <label class="text-xs font-bold uppercase">Am:</label>
                    <div class="flex items-center">
                        <input type="number" id="Am_val" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center font-bold" value="2400" oninput="calculate()">
                        <select id="Am_unit" onchange="calculate()" class="unit-select"><option value="1">mm²</option><option value="100">cm²</option></select>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-700">
                    <div class="flex items-center justify-between">
                        <label class="text-xs font-bold uppercase text-indigo-400 italic">rúd hossza (l):</label>
                        <div class="flex items-center">
                            <input type="number" id="L" class="w-20 p-2 bg-slate-900 border border-indigo-900 rounded-xl text-center" value="1000" oninput="calculate()">
                            <select id="L_unit" onchange="calculate()" class="unit-select"><option value="1">mm</option><option value="1000">m</option></select>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4">
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[9px] font-black uppercase text-slate-500">Nyomaték (Mt)</label>
                        <input type="number" id="Mt" class="w-full p-2 bg-slate-900 border border-slate-700 rounded-xl mt-1" value="500" oninput="calculate()">
                    </div>
                    <select id="Mt_unit" onchange="calculate()" class="bg-slate-700 p-2 rounded-xl text-[10px] font-bold self-end mb-1">
                        <option value="1000">Nm</option>
                        <option value="1000000">kNm</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="grid md:grid-cols-2 gap-6 items-start">
                <div class="flex flex-col gap-2">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Szelvény méretek jelölése</span>
                    <canvas id="canvas" width="400" height="400" class="w-full h-auto aspect-square"></canvas>
                </div>

                <div class="space-y-4">
                    <div class="bg-indigo-600 p-6 rounded-3xl shadow-xl">
                        <p class="text-[10px] font-black text-indigo-200 uppercase mb-1 leading-none">Max. csúsztatófeszültség (τ_max)</p>
                        <div class="flex items-baseline justify-between">
                            <h2 id="outTau" class="text-5xl font-900 tracking-tighter">-</h2>
                            <select id="tau_unit" onchange="calculate()" class="bg-indigo-700 text-[10px] font-black uppercase px-2 py-1 rounded">
                                <option value="1">MPa</option><option value="100">N/cm²</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span id="labelInertia" class="text-[9px] font-black text-slate-500 uppercase">Inercia nyomaték</span>
                            <select id="it_unit" onchange="calculate()" class="bg-slate-700 text-[8px] font-bold px-1 rounded"><option value="1">mm⁴</option><option value="0.0001">cm⁴</option></select>
                        </div>
                        <div id="outIt" class="text-xl font-black text-slate-100">-</div>
                    </div>

                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <span class="text-[9px] font-black text-slate-500 uppercase block mb-1">Fajlagos elcsavarodás (ϑ)</span>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="text-sm font-bold text-indigo-400" id="outThetaRad">- rad/m</div>
                            <div class="text-sm font-bold text-indigo-400" id="outThetaDeg">- fok/m</div>
                        </div>
                    </div>

                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 border-l-4 border-indigo-500">
                        <span class="text-[9px] font-black text-slate-500 uppercase block mb-1">Szögelfordulás l távolságon (φ)</span>
                        <div id="outPhi" class="text-xl font-black text-indigo-400">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function updateUI() {
    const type = document.getElementById('type').value;
    const ids = ['div-D', 'div-d', 'div-a', 'div-b', 'div-t', 'div-Am'];
    ids.forEach(id => document.getElementById(id).classList.add('hidden'));

    if (type === 'kor') { 
        document.getElementById('div-D').classList.remove('hidden');
        document.getElementById('label-D').innerText = "D:";
    }
    if (type === 'gyuru') { 
        document.getElementById('div-D').classList.remove('hidden'); 
        document.getElementById('div-d').classList.remove('hidden');
        document.getElementById('label-D').innerText = "D:"; 
    }
    if (type === 'teglalap') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-b').classList.remove('hidden'); }
    if (type === 'nyitott') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }
    if (type === 'zart') { document.getElementById('div-Am').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }

    // 4) Felirat módosítása
    document.getElementById('labelInertia').innerText = (type === 'kor' || type === 'gyuru') ? "Poláris másodrendű nyomaték (Ip)" : "Torziós másodrendű nyomaték (It)";
    
    calculate();
}

// 6) Magyarázó rajz készítése
function drawSchema(type) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#334155'; ctx.fillStyle = '#64748b'; ctx.lineWidth = 2;
    const cx = 200; const cy = 200;

    if(type === 'kor' || type === 'gyuru') {
        ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(cx-80, cy); ctx.lineTo(cx+80, cy); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillText("D", cx, cy-90);
        if(type === 'gyuru') {
            ctx.beginPath(); ctx.arc(cx, cy, 50, 0, Math.PI*2); ctx.stroke();
            ctx.fillText("d", cx, cy-40);
        }
    } else if(type === 'teglalap') {
        ctx.strokeRect(cx-100, cy-50, 200, 100);
        ctx.fillText("b", cx, cy-60); ctx.fillText("a", cx+110, cy);
    } else if(type === 'nyitott' || type === 'zart') {
        ctx.strokeRect(cx-80, cy-80, 160, 160);
        ctx.fillText("t", cx-95, cy);
        if(type === 'zart') ctx.fillText("Am (középvonal)", cx-40, cy);
    }
}

function calculate() {
    const type = document.getElementById('type').value;
    const Mt = parseFloat(document.getElementById('Mt').value) * parseFloat(document.getElementById('Mt_unit').value);
    const G = parseFloat(document.getElementById('G').value) * 1000; // GPa fix
    const l = parseFloat(document.getElementById('L').value) * parseFloat(document.getElementById('L_unit').value);

    let IpIt, Wt;

    if (type === 'kor') {
        const D = parseFloat(document.getElementById('D').value) * parseFloat(document.getElementById('D_unit').value);
        IpIt = (Math.PI * Math.pow(D, 4)) / 32;
        Wt = IpIt / (D / 2);
    } else if (type === 'gyuru') {
        const D = parseFloat(document.getElementById('D').value) * parseFloat(document.getElementById('D_unit').value);
        const d = parseFloat(document.getElementById('d').value) * parseFloat(document.getElementById('d_unit').value);
        IpIt = (Math.PI * (Math.pow(D, 4) - Math.pow(d, 4))) / 32;
        Wt = IpIt / (D / 2);
    } else if (type === 'teglalap') {
        const b = parseFloat(document.getElementById('a_val').value) * parseFloat(document.getElementById('a_unit').value);
        const a = parseFloat(document.getElementById('b_val').value) * parseFloat(document.getElementById('b_unit').value);
        let r = b/a; let alpha = 0.208, beta = 0.141;
        if(r >= 10) { alpha = 0.312; beta = 0.312; } else if(r >= 2) { alpha = 0.246; beta = 0.229; }
        IpIt = beta * b * Math.pow(a, 3);
        Wt = alpha * b * Math.pow(a, 2);
    } else if (type === 'nyitott') {
        const b = parseFloat(document.getElementById('a_val').value) * parseFloat(document.getElementById('a_unit').value);
        const t = parseFloat(document.getElementById('t_val').value) * parseFloat(document.getElementById('t_unit').value);
        IpIt = (b * Math.pow(t, 3)) / 3;
        Wt = IpIt / t;
    } else if (type === 'zart') {
        const Am = parseFloat(document.getElementById('Am_val').value) * parseFloat(document.getElementById('Am_unit').value);
        const t = parseFloat(document.getElementById('t_val').value) * parseFloat(document.getElementById('t_unit').value);
        Wt = 2 * Am * t;
        IpIt = (4 * Am * Am * t) / (4 * Math.sqrt(Am));
    }

    const tau = (Mt / Wt) * parseFloat(document.getElementById('tau_unit').value);
    const thetaRadM = (Mt / (G * IpIt)) * 1000; // rad/m
    const thetaDegM = thetaRadM * (180 / Math.PI);
    const phiRad = thetaRadM * (l / 1000);

    document.getElementById('outTau').innerText = tau.toFixed(2);
    document.getElementById('outIt').innerText = (IpIt * parseFloat(document.getElementById('it_unit').value)).toLocaleString('hu-HU', {maximumFractionDigits: 0});
    document.getElementById('outThetaRad').innerText = thetaRadM.toFixed(6) + " rad/m";
    document.getElementById('outThetaDeg').innerText = thetaDegM.toFixed(4) + " fok/m";
    document.getElementById('outPhi').innerText = (phiRad * 180 / Math.PI).toFixed(4) + "°";

    drawSchema(type);
}

window.onload = updateUI;
</script>
</body>
</html>
