<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mechanika - Csavarás Vizualizációval</title>
    <style>
        canvas { background-color: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-6 font-sans">

<div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden">
    <div class="bg-indigo-950 p-6 text-white text-center">
        <h1 class="text-2xl font-bold tracking-tight">CSAVARÁS ELLENŐRZŐ ÉS VIZUALIZÁCIÓ</h1>
        <p class="text-indigo-300 text-sm">Prizmatikus rudak szabad csavarása az I-III. előadások alapján</p>
    </div>

    <div class="p-6 grid lg:grid-cols-3 gap-8">
        
        <div class="space-y-4">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Keresztmetszet típusa</label>
                <select id="type" onchange="updateUI()" class="w-full p-2 border rounded bg-white focus:ring-2 focus:ring-indigo-500">
                    <option value="kor">Kör</option>
                    <option value="gyuru">Vastagfalú gyűrű</option>
                    <option value="teglalap">Téglalap (Saint-Venant)</option>
                    <option value="nyitott">Vékonyfalú nyitott (U-profil)</option>
                    <option value="zart">Vékonyfalú zárt (Bredt)</option>
                </select>
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-3 shadow-sm">
                <h3 class="font-bold text-slate-700 text-xs uppercase border-b pb-1">Geometria [mm]</h3>
                <div id="div-D"><label class="text-xs">Átmérő (D):</label><input type="number" id="D" class="w-full p-1 border rounded" value="60"></div>
                <div id="div-d" class="hidden"><label class="text-xs">Belső átmérő (d):</label><input type="number" id="d" class="w-full p-1 border rounded" value="40"></div>
                <div id="div-a" class="hidden"><label class="text-xs">Oldal 'b' (hosszabb):</label><input type="number" id="a_val" class="w-full p-1 border rounded" value="80"></div>
                <div id="div-b" class="hidden"><label class="text-xs">Oldal 'a' (rövidebb):</label><input type="number" id="b_val" class="w-full p-1 border rounded" value="40"></div>
                <div id="div-t" class="hidden"><label class="text-xs">Falvastagság (t):</label><input type="number" id="t_val" class="w-full p-1 border rounded" value="3"></div>
                <div id="div-Am" class="hidden"><label class="text-xs text-indigo-600 font-bold">Terület (Am):</label><input type="number" id="Am_val" class="w-full p-1 border rounded border-indigo-200" value="2400"></div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase text-center">Terhelés: Mt [Nm]</label>
                <input type="range" id="Mt" min="10" max="2000" value="500" oninput="calculate()" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                <p id="Mt_val" class="text-center font-mono font-bold text-indigo-700 mt-1">500 Nm</p>
            </div>
            
            <button onclick="calculate()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-800 transition uppercase shadow-md">Frissítés</button>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="grid md:grid-cols-2 gap-4 h-full">
                <div class="flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Feszültségeloszlás ábra</h3>
                    <canvas id="canvas" width="300" height="300" class="w-full h-auto shadow-inner"></canvas>
                    <p class="text-[10px] text-slate-400 mt-2 italic text-center">Megjegyzés: Az ábra szemléltető jellegű (feszültségvektorok iránya).</p>
                </div>

                <div class="space-y-4">
                    <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                        <p class="text-[10px] font-black text-indigo-400 uppercase italic">Max. feszültség (τ_max)</p>
                        <p id="outTau" class="text-4xl font-mono font-black text-indigo-900 leading-none">-</p>
                        <p class="text-xs text-indigo-600 font-bold mt-1">MPa (N/mm²)</p>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-sm space-y-2">
                        <p class="flex justify-between font-mono"><span>It:</span> <span id="outIt" class="font-bold">-</span></p>
                        <p class="flex justify-between font-mono"><span>Wt:</span> <span id="outWt" class="font-bold">-</span></p>
                        <hr>
                        <p class="flex justify-between text-indigo-700"><span>φ:</span> <span id="outPhi" class="font-bold">-</span></p>
                    </div>

                    <div id="formulaDisplay" class="text-[10px] p-3 bg-white border border-slate-200 rounded-lg text-slate-500 font-serif leading-relaxed">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function updateUI() {
    const type = document.getElementById('type').value;
    const divs = ['div-D', 'div-d', 'div-a', 'div-b', 'div-t', 'div-Am'];
    divs.forEach(d => document.getElementById(d).classList.add('hidden'));

    if (type === 'kor') document.getElementById('div-D').classList.remove('hidden');
    if (type === 'gyuru') { document.getElementById('div-D').classList.remove('hidden'); document.getElementById('div-d').classList.remove('hidden'); }
    if (type === 'teglalap') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-b').classList.remove('hidden'); }
    if (type === 'nyitott') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }
    if (type === 'zart') { document.getElementById('div-Am').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }
    
    calculate();
}

function drawDist(type) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.strokeStyle = '#334155';

    if (type === 'kor' || type === 'gyuru') {
        ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI * 2); ctx.stroke();
        if (type === 'gyuru') { ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.stroke(); }
        // Nyilak rajzolása (feszültség)
        ctx.strokeStyle = '#ef4444';
        for(let i=0; i<8; i++){
            let ang = (i*Math.PI)/4;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(ang)*40, cy + Math.sin(ang)*40);
            ctx.lineTo(cx + Math.cos(ang)*60 + Math.sin(ang)*15, cy + Math.sin(ang)*60 - Math.cos(ang)*15);
            ctx.stroke();
        }
    } else if (type === 'teglalap') {
        ctx.strokeRect(cx-60, cy-40, 120, 80);
        ctx.fillStyle = '#ef4444';
        // Max feszültség a hosszabb oldal közepén (Saint-Venant ábra)
        ctx.beginPath(); ctx.arc(cx, cy-40, 5, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy+40, 5, 0, 7); ctx.fill();
    } else if (type === 'nyitott') {
        ctx.beginPath(); ctx.moveTo(cx-50, cy-40); ctx.lineTo(cx+50, cy-40); ctx.lineTo(cx+50, cy+40); ctx.lineTo(cx-50, cy+40); ctx.stroke();
        ctx.setLineDash([5, 5]); ctx.strokeStyle = '#ef4444'; ctx.stroke(); ctx.setLineDash([]);
    } else if (type === 'zart') {
        ctx.strokeRect(cx-50, cy-50, 100, 100);
        ctx.strokeStyle = '#ef4444';
        ctx.beginPath(); ctx.rect(cx-47, cy-47, 94, 94); ctx.stroke();
    }
}

function calculate() {
    const type = document.getElementById('type').value;
    const Mt_nm = document.getElementById('Mt').value;
    document.getElementById('Mt_val').innerText = Mt_nm + " Nm";
    const Mt = Mt_nm * 1000;
    const G = parseFloat(document.getElementById('G').value) * 1000;
    const L = parseFloat(document.getElementById('L').value);

    let It, Wt, desc;

    if (type === 'kor') {
        const D = parseFloat(document.getElementById('D').value);
        It = (Math.PI * Math.pow(D, 4)) / 32;
        Wt = (Math.PI * Math.pow(D, 3)) / 16;
        desc = "Kör rúd: A feszültség a sugár mentén lineárisan nő, a külső szálban maximális.";
    } else if (type === 'gyuru') {
        const D = parseFloat(document.getElementById('D').value);
        const d = parseFloat(document.getElementById('d').value);
        It = (Math.PI * (Math.pow(D, 4) - Math.pow(d, 4))) / 32;
        Wt = It / (D/2);
        desc = "Vastagfalú gyűrű: A belső furatnál nem nulla a feszültség (vastagfalú elmélet).";
    } else if (type === 'teglalap') {
        const b = parseFloat(document.getElementById('a_val').value);
        const a = parseFloat(document.getElementById('b_val').value);
        const ratio = b/a;
        let alpha = 0.208, beta = 0.141; // b/a = 1 alapértelmezett
        if(ratio >= 10) { alpha = 0.312; beta = 0.312; }
        else if(ratio >= 2) { alpha = 0.246; beta = 0.229; }
        It = beta * b * Math.pow(a, 3);
        Wt = alpha * b * Math.pow(a, 2);
        desc = "Téglalap: A sarkokban a feszültség zéró! A maximum a hosszabb oldal felezőpontjában van.";
    } else if (type === 'nyitott') {
        const b = parseFloat(document.getElementById('a_val').value);
        const t = parseFloat(document.getElementById('t_val').value);
        It = (b * Math.pow(t, 3)) / 3;
        Wt = It / t;
        desc = "Nyitott szelvény: A merevség csekély (t³-al arányos). A feszültség a falvastagság mentén oszlik el.";
    } else if (type === 'zart') {
        const Am = parseFloat(document.getElementById('Am_val').value);
        const t = parseFloat(document.getElementById('t_val').value);
        Wt = 2 * Am * t;
        It = (4 * Math.pow(Am, 2)) / ( (2*Math.sqrt(Am)*4) / t); // Közelítő It
        desc = "Bredt-képlet: Zárt szelvényben állandó nyírófolyam (q = τ·t) alakul ki. Sokkal merevebb, mint a nyitott!";
    }

    const tau = Mt / Wt;
    const phi = (Mt * L / (G * It)) * (180 / Math.PI);

    document.getElementById('outTau').innerText = tau.toFixed(2);
    document.getElementById('outIt').innerText = Math.round(It).toLocaleString() + " mm⁴";
    document.getElementById('outWt').innerText = Math.round(Wt).toLocaleString() + " mm³";
    document.getElementById('outPhi').innerText = phi.toFixed(4) + " °";
    document.getElementById('formulaDisplay').innerText = desc;
    drawDist(type);
}

updateUI();
</script>
</body>
</html>
