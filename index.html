<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mechanika Profi Kalkulátor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        canvas { background-color: #0f172a; border-radius: 1.5rem; }
        * { font-style: normal !important; } /* Dőlt betűk tiltása */
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8 text-slate-100">

<div class="max-w-7xl mx-auto">
    <div class="mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-900 tracking-tighter uppercase text-indigo-400">Mechanika II.</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Prizmatikus rudak szabad csavarása</p>
        </div>
        <div class="text-right">
            <span class="bg-indigo-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Bánki Donát Kar</span>
        </div>
    </div>

    <div class="grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl">
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Keresztmetszet Kiválasztása</label>
                <select id="type" onchange="updateUI()" class="w-full p-4 bg-slate-900 border-2 border-slate-700 rounded-2xl font-bold text-indigo-400 focus:border-indigo-500 outline-none transition-all">
                    <option value="kor">Kör szelvény</option>
                    <option value="gyuru">Körgyűrű szelvény</option>
                    <option value="teglalap">Téglalap (Saint-Venant)</option>
                    <option value="nyitott">Vékonyfalú nyitott</option>
                    <option value="zart">Vékonyfalú zárt (Bredt)</option>
                </select>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4 shadow-2xl">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-700 pb-2 mb-4">Geometria és Terhelés</h3>
                
                <div id="div-D" class="flex items-center justify-between"><label class="text-xs font-bold uppercase">Külső átmérő (D):</label><input type="number" id="D" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="60" oninput="calculate()"></div>
                <div id="div-d" class="hidden flex items-center justify-between"><label class="text-xs font-bold uppercase">Belső átmérő (d):</label><input type="number" id="d" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="40" oninput="calculate()"></div>
                <div id="div-a" class="hidden flex items-center justify-between"><label class="text-xs font-bold uppercase">Oldal 'b':</label><input type="number" id="a_val" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="80" oninput="calculate()"></div>
                <div id="div-b" class="hidden flex items-center justify-between"><label class="text-xs font-bold uppercase">Oldal 'a':</label><input type="number" id="b_val" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="40" oninput="calculate()"></div>
                <div id="div-t" class="hidden flex items-center justify-between"><label class="text-xs font-bold uppercase">Vastagság (t):</label><input type="number" id="t_val" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center" value="3" oninput="calculate()"></div>
                <div id="div-Am" class="hidden flex items-center justify-between"><label class="text-xs font-bold uppercase text-indigo-400">Terület (Am):</label><input type="number" id="Am_val" class="w-24 p-2 bg-slate-900 border border-indigo-900 rounded-xl text-center" value="2400" oninput="calculate()"></div>

                <hr class="border-slate-700 my-4">

                <div class="space-y-3">
                    <div class="flex justify-between items-center text-[10px] font-black uppercase text-slate-500">Nyomaték (Mt)</div>
                    <div class="flex gap-2">
                        <input type="number" id="Mt" class="flex-1 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center font-bold" value="500" oninput="calculate()">
                        <select id="Mt_unit" onchange="calculate()" class="bg-slate-700 p-2 rounded-xl text-[10px] font-bold uppercase">
                            <option value="1000">Nm</option>
                            <option value="1000000">kNm</option>
                        </select>
                    </div>
                    <div class="flex justify-between items-center text-[10px] font-black uppercase text-slate-500">G modulus</div>
                    <div class="flex gap-2">
                        <input type="number" id="G" class="flex-1 p-2 bg-slate-900 border border-slate-700 rounded-xl text-center font-bold" value="80" oninput="calculate()">
                        <select id="G_unit" onchange="calculate()" class="bg-slate-700 p-2 rounded-xl text-[10px] font-bold uppercase">
                            <option value="1000">GPa</option>
                            <option value="1">MPa</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-8">
            <div class="grid md:grid-cols-2 gap-8 h-full">
                <div class="relative">
                    <span class="absolute top-4 left-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Feszültségeloszlás diagram</span>
                    <canvas id="canvas" width="450" height="450" class="w-full h-auto aspect-square"></canvas>
                </div>

                <div class="flex flex-col gap-4">
                    <div class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-500/20">
                        <p class="text-[10px] font-black text-indigo-200 uppercase tracking-widest mb-2 leading-none">Max. csúsztatófeszültség</p>
                        <div class="flex items-baseline justify-between">
                            <h2 id="outTau" class="text-6xl font-900 tracking-tighter">-</h2>
                            <select id="tau_unit" onchange="calculate()" class="bg-indigo-700 text-[10px] font-black uppercase px-2 py-1 rounded-lg">
                                <option value="1">MPa</option>
                                <option value="0.1">bar</option>
                                <option value="100">N/cm²</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span id="labelInertia" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Inercia nyomaték</span>
                            <select id="it_unit" onchange="calculate()" class="bg-slate-700 text-[9px] font-bold uppercase px-2 py-1 rounded">
                                <option value="1">mm⁴</option>
                                <option value="0.0001">cm⁴</option>
                            </select>
                        </div>
                        <div id="outIt" class="text-2xl font-black text-slate-100">-</div>
                    </div>

                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Szögelfordulás (φ)</span>
                            <select id="phi_unit" onchange="calculate()" class="bg-slate-700 text-[9px] font-bold uppercase px-2 py-1 rounded">
                                <option value="deg">Fok (°)</option>
                                <option value="rad">Radián</option>
                            </select>
                        </div>
                        <div id="outPhi" class="text-2xl font-black text-indigo-400">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function updateUI() {
    const type = document.getElementById('type').value;
    const ids = ['div-D', 'div-d', 'div-a', 'div-b', 'div-t', 'div-Am'];
    ids.forEach(id => document.getElementById(id).classList.add('hidden'));

    if (type === 'kor') document.getElementById('div-D').classList.remove('hidden');
    if (type === 'gyuru') { document.getElementById('div-D').classList.remove('hidden'); document.getElementById('div-d').classList.remove('hidden'); }
    if (type === 'teglalap') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-b').classList.remove('hidden'); }
    if (type === 'nyitott') { document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }
    if (type === 'zart') { document.getElementById('div-Am').classList.remove('hidden'); document.getElementById('div-t').classList.remove('hidden'); }

    // Label javítása
    document.getElementById('labelInertia').innerText = (type === 'kor' || type === 'gyuru') ? "Poláris nyomaték (Ip)" : "Torziós nyomaték (It)";
    
    calculate();
}

function drawStress(type, Mt_ratio) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const scale = 140;
    
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 2;

    if (type === 'kor' || type === 'gyuru') {
        const d_val = parseFloat(document.getElementById('d').value);
        const D_val = parseFloat(document.getElementById('D').value);
        const innerScale = type === 'gyuru' ? (d_val/D_val) * scale : 0;

        // Rajz
        ctx.beginPath(); ctx.arc(cx, cy, scale, 0, Math.PI*2); ctx.stroke();
        if(innerScale > 0) { ctx.beginPath(); ctx.arc(cx, cy, innerScale, 0, Math.PI*2); ctx.stroke(); }

        // Feszültség diagram nyilak
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 3;
        for(let a=0; a<Math.PI*2; a+=Math.PI/4) {
            let startX = cx + Math.cos(a) * innerScale;
            let startY = cy + Math.sin(a) * innerScale;
            let endX = cx + Math.cos(a) * scale;
            let endY = cy + Math.sin(a) * scale;
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            // Max pont jelölése
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath(); ctx.arc(endX, endY, 4, 0, 7); ctx.fill();
        }
    } else if (type === 'teglalap') {
        ctx.strokeRect(cx-120, cy-60, 240, 120);
        ctx.fillStyle = '#f43f5e';
        ctx.beginPath(); ctx.arc(cx, cy-60, 6, 0, 7); ctx.fill(); // tau_max helye
        ctx.beginPath(); ctx.arc(cx, cy+60, 6, 0, 7); ctx.fill();
    } else if (type === 'nyitott') {
        ctx.beginPath(); ctx.moveTo(cx-100, cy-40); ctx.lineTo(cx+100, cy-40); ctx.lineTo(cx+100, cy+40); ctx.stroke();
        ctx.fillStyle = '#f43f5e';
        ctx.beginPath(); ctx.arc(cx+100, cy, 6, 0, 7); ctx.fill();
    } else if (type === 'zart') {
        ctx.strokeRect(cx-80, cy-80, 160, 160);
        ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 1; ctx.strokeRect(cx-76, cy-76, 152, 152);
        ctx.fillStyle = '#f43f5e'; ctx.beginPath(); ctx.arc(cx+80, cy, 6, 0, 7); ctx.fill();
    }
}

function calculate() {
    const type = document.getElementById('type').value;
    const Mt = parseFloat(document.getElementById('Mt').value) * parseFloat(document.getElementById('Mt_unit').value);
    const G = parseFloat(document.getElementById('G').value) * parseFloat(document.getElementById('G_unit').value);
    const L = 1000; // Alapértelmezett 1m

    let IpIt, Wt;

    if (type === 'kor') {
        const D = parseFloat(document.getElementById('D').value);
        IpIt = (Math.PI * Math.pow(D, 4)) / 32;
        Wt = IpIt / (D / 2);
    } else if (type === 'gyuru') {
        const D = parseFloat(document.getElementById('D').value);
        const d = parseFloat(document.getElementById('d').value);
        IpIt = (Math.PI * (Math.pow(D, 4) - Math.pow(d, 4))) / 32;
        Wt = IpIt / (D / 2);
    } else if (type === 'teglalap') {
        const b = parseFloat(document.getElementById('a_val').value);
        const a = parseFloat(document.getElementById('b_val').value);
        let r = b/a; let alpha = 0.208, beta = 0.141;
        if(r >= 10) { alpha = 0.312; beta = 0.312; } else if(r >= 2) { alpha = 0.246; beta = 0.229; }
        IpIt = beta * b * Math.pow(a, 3);
        Wt = alpha * b * Math.pow(a, 2);
    } else if (type === 'nyitott') {
        const b = parseFloat(document.getElementById('a_val').value);
        const t = parseFloat(document.getElementById('t_val').value);
        IpIt = (b * Math.pow(t, 3)) / 3;
        Wt = IpIt / t;
    } else if (type === 'zart') {
        const Am = parseFloat(document.getElementById('Am_val').value);
        const t = parseFloat(document.getElementById('t_val').value);
        Wt = 2 * Am * t;
        IpIt = (4 * Am * Am * t) / (4 * Math.sqrt(Am));
    }

    const tau = (Mt / Wt) * parseFloat(document.getElementById('tau_unit').value);
    const phiRad = (Mt * L) / (G * IpIt);
    const itDisp = IpIt * parseFloat(document.getElementById('it_unit').value);
    
    // Megjelenítés
    document.getElementById('outTau').innerText = tau.toFixed(2);
    document.getElementById('outIt').innerText = itDisp.toLocaleString('hu-HU', {maximumFractionDigits: 0});
    
    if(document.getElementById('phi_unit').value === 'deg') {
        document.getElementById('outPhi').innerText = (phiRad * 180 / Math.PI).toFixed(4) + "°";
    } else {
        document.getElementById('outPhi').innerText = phiRad.toFixed(6) + " rad";
    }

    drawStress(type, 1);
}

window.onload = updateUI;
</script>
</body>
</html>
