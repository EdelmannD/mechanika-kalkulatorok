<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mechanika - Interaktív Kalkulátor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        body { font-family: 'Inter', sans-serif; }
        canvas { background-color: #ffffff; border-radius: 1rem; border: 2px solid #cbd5e1; }
        .math { font-family: 'Libre Baskerville', serif; font-style: italic; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8 text-slate-100">

<div class="max-w-7xl mx-auto">
    <div class="mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-3xl font-900 tracking-tighter uppercase text-indigo-400">Mechanika válogatott fejezetei</h1>
        <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Szabad Csavarás – Dinamikus Szelvényvizsgáló</p>
    </div>

    <div class="grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-800 p-6 rounded-3xl shadow-xl border border-slate-700">
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-3 tracking-widest">Szelvény típusa</label>
                <select id="type" onchange="updateUI()" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl font-bold text-indigo-400 outline-none">
                    <option value="kor">Kör szelvény</option>
                    <option value="gyuru">Körgyűrű szelvény</option>
                    <option value="teglalap">Téglalap (Saint-Venant)</option>
                    <option value="nyitott">Vékonyfalú nyitott (η-val)</option>
                    <option value="zart">Vékonyfalú zárt (Bredt)</option>
                </select>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl shadow-xl space-y-4 border border-slate-700">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-700 pb-2">Paraméterek</h3>
                
                <div id="div-D" class="flex items-center justify-between"><label class="text-sm math">D (mm):</label><input type="number" id="D" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="60" oninput="calculate()"></div>
                <div id="div-d" class="hidden flex items-center justify-between"><label class="text-sm math">d (mm):</label><input type="number" id="d" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="40" oninput="calculate()"></div>
                <div id="div-a" class="hidden flex items-center justify-between"><label class="text-sm math">b (mm):</label><input type="number" id="a_val" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="80" oninput="calculate()"></div>
                <div id="div-b" class="hidden flex items-center justify-between"><label class="text-sm math">a (mm):</label><input type="number" id="b_val" class="w-24 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="40" oninput="calculate()"></div>

                <div id="div-open-inputs" class="hidden space-y-3">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-bold text-indigo-400">Szakaszok száma:</label><input type="number" id="n_elem" value="3" min="1" max="6" class="w-12 bg-slate-900 border border-indigo-500 rounded text-center" oninput="generateInputs()"></div>
                    <div class="grid grid-cols-12 gap-1 text-[9px] text-slate-500 font-bold uppercase text-center"><div class="col-span-1">#</div><div class="col-span-4">Li</div><div class="col-span-3">vi</div><div class="col-span-4">ηi</div></div>
                    <div id="dynamic-rows" class="space-y-2"></div>
                </div>

                <div id="div-zart-options" class="hidden space-y-4">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-bold text-indigo-400">Sokszög oldalszám:</label><input type="number" id="zart_n_elem" value="4" min="3" max="8" class="w-12 bg-slate-900 border border-indigo-500 rounded text-center" oninput="generateZartInputs()"></div>
                    <div class="grid grid-cols-12 gap-1 text-[9px] text-slate-500 font-bold uppercase text-center"><div class="col-span-1">#</div><div class="col-span-6">si (ívhossz)</div><div class="col-span-5">vi (vastagság)</div></div>
                    <div id="dynamic-zart-rows" class="space-y-2"></div>
                </div>

                <div class="pt-4 border-t border-slate-700 space-y-2">
                    <div class="flex items-center justify-between"><label class="text-xs math">Mt (Nm):</label><input type="number" id="Mt" class="w-24 p-1 bg-slate-900 border border-slate-700 rounded text-center" value="500" oninput="calculate()"></div>
                    <div class="flex items-center justify-between"><label class="text-xs math">G (MPa):</label><input type="number" id="G_val" class="w-24 p-1 bg-slate-900 border border-slate-700 rounded text-center" value="80000" oninput="calculate()"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <canvas id="canvas" width="400" height="400" class="w-full h-auto"></canvas>
                <div class="space-y-4">
                    <div class="bg-indigo-600 p-6 rounded-3xl shadow-xl">
                        <span class="text-[10px] font-black text-indigo-200 uppercase block mb-1">Max. feszültség (τ_max) [MPa]</span>
                        <h2 id="outTau" class="text-4xl font-900 text-white">0.0000</h2>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <span class="text-[9px] font-black text-slate-500 uppercase block mb-1">Tehetetlenségi nyomaték (It) [mm⁴]</span>
                        <div id="outIt" class="text-xl font-black text-white">0</div>
                    </div>
                    <div id="ak-display" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 hidden">
                        <span class="text-[9px] font-black text-slate-500 uppercase block mb-1">Középvonal területe (Ak) [mm²]</span>
                        <div id="outAk" class="text-xl font-black text-indigo-400">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function generateInputs() {
    const n = Math.min(6, document.getElementById('n_elem').value || 1);
    const container = document.getElementById('dynamic-rows');
    container.innerHTML = '';
    for(let i=1; i<=n; i++) {
        container.innerHTML += `
            <div class="grid grid-cols-12 gap-2 items-center">
                <span class="col-span-1 text-[10px] font-bold text-slate-500">${i}</span>
                <input type="number" id="Li_${i}" value="${i==1?80:40}" class="col-span-4 p-1 bg-slate-900 border border-slate-700 rounded text-center text-xs" oninput="calculate()">
                <input type="number" id="vi_${i}" value="4" class="col-span-3 p-1 bg-slate-900 border border-slate-700 rounded text-center text-xs" oninput="calculate()">
                <input type="number" id="eta_${i}" value="1.12" step="0.01" class="col-span-4 p-1 bg-slate-900 border border-indigo-900 rounded text-center text-xs text-indigo-300" oninput="calculate()">
            </div>`;
    }
    calculate();
}

function generateZartInputs() {
    const n = Math.max(3, Math.min(8, document.getElementById('zart_n_elem').value || 4));
    const container = document.getElementById('dynamic-zart-rows');
    container.innerHTML = '';
    for(let i=1; i<=n; i++) {
        container.innerHTML += `
            <div class="grid grid-cols-12 gap-2 items-center">
                <span class="col-span-1 text-[10px] font-bold text-slate-500">${i}</span>
                <input type="number" id="zs_${i}" value="100" class="col-span-6 p-1 bg-slate-900 border border-slate-700 rounded text-center text-xs" oninput="calculate()">
                <input type="number" id="zv_${i}" value="4" class="col-span-5 p-1 bg-slate-900 border border-slate-700 rounded text-center text-xs" oninput="calculate()">
            </div>`;
    }
    calculate();
}

function updateUI() {
    const type = document.getElementById('type').value;
    ['div-D','div-d','div-a','div-b','div-zart-options','div-open-inputs'].forEach(d => document.getElementById(d).style.display = 'none');
    document.getElementById('ak-display').style.display = (type === 'zart') ? 'block' : 'none';
    
    if (type === 'kor') document.getElementById('div-D').style.display = 'flex';
    if (type === 'gyuru') { document.getElementById('div-D').style.display = 'flex'; document.getElementById('div-d').style.display = 'flex'; }
    if (type === 'teglalap') { document.getElementById('div-a').style.display = 'flex'; document.getElementById('div-b').style.display = 'flex'; }
    if (type === 'nyitott') { document.getElementById('div-open-inputs').style.display = 'block'; generateInputs(); }
    if (type === 'zart') { document.getElementById('div-zart-options').style.display = 'block'; generateZartInputs(); }
    calculate();
}

function calculate() {
    const type = document.getElementById('type').value;
    const Mt = (parseFloat(document.getElementById('Mt').value) || 0) * 1000;
    let It = 0, Wt = 0, Ak = 0;

    if (type === 'kor') {
        const D = parseFloat(document.getElementById('D').value) || 1;
        It = (Math.PI * Math.pow(D,4))/32; Wt = It/(D/2);
    } else if (type === 'nyitott') {
        const n = parseInt(document.getElementById('n_elem').value);
        let maxV = 0;
        for(let i=1; i<=n; i++) {
            const l = parseFloat(document.getElementById(`Li_${i}`).value) || 0;
            const v = parseFloat(document.getElementById(`vi_${i}`).value) || 0;
            const eta = parseFloat(document.getElementById(`eta_${i}`).value) || 1;
            It += eta * (l * Math.pow(v,3))/3;
            if(v > maxV) maxV = v;
        }
        Wt = It/maxV;
    } else if (type === 'zart') {
        const n = parseInt(document.getElementById('zart_n_elem').value);
        let sum_sv = 0, total_s = 0, minV = Infinity;
        for(let i=1; i<=n; i++) {
            const s = parseFloat(document.getElementById(`zs_${i}`).value) || 0;
            const v = parseFloat(document.getElementById(`zv_${i}`).value) || 1;
            sum_sv += s/v; total_s += s;
            if(v < minV) minV = v;
        }
        Ak = (Math.pow(total_s, 2) * n) / (4 * Math.PI * Math.tan(Math.PI/n)) * 0.16; // Közelítés
        It = (4 * Ak * Ak) / sum_sv;
        Wt = 2 * Ak * minV;
        document.getElementById('outAk').innerText = Ak.toFixed(0);
    }
    
    document.getElementById('outIt').innerText = It.toLocaleString('hu-HU', {maximumFractionDigits: 0});
    document.getElementById('outTau').innerText = (Mt/Wt).toFixed(4);
    drawSchema(type);
}

function drawSchema(type) {
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 400, 400); ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 3;
    const cx = 200, cy = 200;

    if(type === 'nyitott') {
        ctx.beginPath(); ctx.moveTo(100, 100); ctx.lineTo(100, 300); ctx.lineTo(300, 300); ctx.lineTo(300, 150); ctx.stroke();
    } else if(type === 'zart') {
        const n = parseInt(document.getElementById('zart_n_elem').value);
        ctx.setLineDash([5, 5]); ctx.beginPath();
        for(let i=0; i<=n; i++) {
            const angle = (i * 2 * Math.PI / n) - Math.PI/2;
            const x = cx + 100 * Math.cos(angle), y = cy + 100 * Math.sin(angle);
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = '#6366f1'; ctx.font = "bold 14px Inter"; ctx.fillText("Ak", cx-10, cy+5);
    } else {
        ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI*2); ctx.stroke();
    }
}
window.onload = updateUI;
</script>
</body>
</html>
