<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mechanika - Prizmatikus Rúd Kalkulátor V1.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        canvas { background-color: #ffffff; border-radius: 1rem; border: 2px solid #334155; }
        .math { font-family: 'Libre Baskerville', serif; font-style: italic; }
        .unit-select { font-size: 0.7rem; background: #1e293b; color: #818cf8; border: 1px solid #475569; border-radius: 4px; padding: 2px; cursor: pointer; outline: none; }
        .unit-select-out { font-size: 0.7rem; background: #334155; color: #cbd5e1; border-radius: 4px; padding: 2px; cursor: pointer; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
<div class="max-w-7xl mx-auto">
    <header class="mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-3xl font-900 tracking-tighter uppercase text-indigo-400">Mechanika Válogatott Fejezetei</h1>
        <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Szabad Csavarás - Interaktív Kalkulátor</p>
    </header>
    <div class="grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-800 p-5 rounded-3xl shadow-xl border border-slate-700">
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Szelvény Kiválasztása</label>
                <select id="type" onchange="updateUI()" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl font-bold text-indigo-400 outline-none">
                    <option value="kor">Kör szelvény</option>
                    <option value="gyuru">Körgyűrű szelvény (vastag)</option>
                    <option value="teglalap">Téglalap (Saint-Venant)</option>
                    <option value="nyitott">Vékonyfalú nyitott</option>
                    <option value="zart">Vékonyfalú zárt (Bredt)</option>
                </select>
            </div>
            <div class="bg-slate-800 p-6 rounded-3xl shadow-xl space-y-4 border border-slate-700">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-700 pb-2">Geometria és Anyag</h3>
                <div id="div-D" class="flex items-center justify-between"><label class="math">D:</label>
                    <div class="flex gap-2 items-center">
                        <input type="number" id="D" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="60" oninput="calculate()">
                        <select id="u-D" class="unit-select" onchange="calculate()"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>
                <div id="div-d" class="hidden flex items-center justify-between"><label class="math">d:</label>
                    <div class="flex gap-2 items-center">
                        <input type="number" id="d_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="40" oninput="calculate()">
                        <select id="u-d" class="unit-select" onchange="calculate()"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>
                <div id="div-a" class="hidden flex items-center justify-between"><label class="math">b:</label>
                    <div class="flex gap-2 items-center">
                        <input type="number" id="a_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="80" oninput="calculate()">
                        <select id="u-a" class="unit-select" onchange="calculate()"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>
                <div id="div-b" class="hidden flex items-center justify-between"><label class="math">a:</label>
                    <div class="flex gap-2 items-center">
                        <input type="number" id="b_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="40" oninput="calculate()">
                        <select id="u-b" class="unit-select" onchange="calculate()"><option value="1">mm</option><option value="10">cm</option></select>
                    </div>
                </div>
                <div id="div-open-spec" class="hidden space-y-3 pt-2 border-t border-slate-700">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-black text-indigo-400">η₀:</label>
                        <input type="number" id="eta0" value="1.15" step="0.01" class="w-16 p-1 bg-slate-900 border border-indigo-500 rounded text-center text-xs font-bold" oninput="calculate()">
                    </div>
                    <input type="number" id="n_elem" value="3" min="1" max="10" class="w-full bg-slate-900 border border-indigo-500 rounded p-2 text-center text-xs" oninput="generateRows()">
                    <div id="dynamic-rows" class="space-y-2 max-h-40 overflow-y-auto"></div>
                </div>
                <div id="div-zart-spec" class="hidden space-y-3 pt-2 border-t border-slate-700">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-black text-indigo-400">Aₖ:</label>
                        <div class="flex gap-2 items-center">
                            <input type="number" id="Ak_in" value="4800" class="w-20 p-2 bg-slate-900 border border-indigo-500 rounded text-center" oninput="calculate()">
                            <select id="u-Ak" class="unit-select" onchange="calculate()"><option value="1">mm²</option><option value="100">cm²</option></select>
                        </div>
                    </div>
                    <input type="number" id="nz_elem" value="4" min="3" class="w-full bg-slate-900 border border-indigo-500 rounded p-2 text-center text-xs" oninput="generateZartRows()">
                    <div id="dynamic-zrows" class="space-y-2"></div>
                </div>
                <div class="pt-4 border-t border-slate-700 space-y-3">
                    <div class="flex items-center justify-between"><label class="math text-indigo-300">l:</label>
                        <div class="flex gap-2 items-center">
                            <input type="number" id="L_rod" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="1000" oninput="calculate()">
                            <select id="u-Lrod" class="unit-select" onchange="calculate()"><option value="1">mm</option><option value="10">cm</option><option value="1000">m</option></select>
                        </div>
                    </div>             
                    <div class="flex items-center justify-between">
                        <select id="input-mode" class="unit-select text-indigo-300 font-bold" onchange="updateInputUnits()">
                            <option value="mt">Mₜ [nyomaték]</option>
                            <option value="tau">τₘₐₓ [feszültség]</option>
                        </select>
                        <div class="flex gap-2 items-center">
                            <input type="number" id="Mt_or_Tau" class="w-20 p-2 bg-slate-900 border border-indigo-500 rounded-lg text-center font-bold text-white" value="500" oninput="calculate()">
                            <select id="u-in-val" class="unit-select" onchange="calculate()">
                            </select>
                        </div>
                    </div>
                    <div class="flex items-center justify-between"><label class="math text-indigo-300">G:</label>
                        <div class="flex gap-2 items-center">
                            <input type="number" id="G_val" class="w-20 p-2 bg-slate-900 border border-slate-700 rounded-lg text-center" value="80" oninput="calculate()">
                            <select id="u-G" class="unit-select" onchange="calculate()">
                                <option value="1000">GPa</option>
                                <option value="1">MPa</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="lg:col-span-8 space-y-6">
            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <canvas id="canvas" width="400" height="400" class="w-full h-auto"></canvas>
                </div>
                <div class="space-y-4">
                    <div id="main-res-box" class="bg-indigo-600 p-5 rounded-3xl shadow-xl border-b-4 border-indigo-800">
                        <div class="flex justify-between items-center mb-1">
                            <span id="main-res-label" class="text-[10px] font-black text-indigo-100 uppercase">Eredmény</span>
                            <select id="ou-main" class="unit-select-out" onchange="calculate()">
                            </select>
                        </div>
                        <h2 id="main-res-val" class="text-4xl font-900 tracking-tighter text-white">0.0000</h2>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span id="sec-res-label" class="text-[9px] font-black text-slate-500 uppercase">Bevitt érték</span>
                        </div>
                        <div id="sec-res-val" class="text-xl font-black text-white">0</div>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-500 uppercase">Másodrendű nyomaték (Iₜ / Iₚ)</span>
                            <select id="ou-it" class="unit-select-out" onchange="calculate()">
                                <option value="1">mm⁴</option>
                                <option value="10000">cm⁴</option>
                                <option value="1000000000000">m⁴</option>
                            </select>
                        </div>
                        <div id="outIt" class="text-xl font-black">0</div>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-500 uppercase">Fajlagos elcsavarodás (ϑ)</span>
                            <select id="ou-th" class="unit-select-out" onchange="calculate()"><option value="radmm">rad/mm</option><option value="radm">rad/m</option><option value="degm">°/m</option></select>
                        </div>
                        <div id="outTheta" class="text-xl font-black text-indigo-400">0.0000</div>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 border-l-4 border-indigo-500">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-500 uppercase">Teljes elfordulás (φ)</span>
                            <select id="ou-phi" class="unit-select-out" onchange="calculate()"><option value="deg">° (fok)</option><option value="rad">rad</option></select>
                        </div>
                        <div id="outPhi" class="text-2xl font-black text-white">0.0000</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>

const SV_TAB = [{r:1,b:0.141,a:0.208},{r:1.5,b:0.196,a:0.231},{r:2,b:0.229,a:0.246},{r:3,b:0.263,a:0.267},{r:4,b:0.281,a:0.282},{r:10,b:0.313,a:0.313},{r:100,b:0.333,a:0.333}];
function interp(r,k){if(r<=SV_TAB[0].r)return SV_TAB[0][k]; if(r>=100)return 0.333; for(let i=0;i<SV_TAB.length-1;i++){let p1=SV_TAB[i],p2=SV_TAB[i+1];if(r>=p1.r&&r<=p2.r)return p1[k]+(r-p1.r)/(p2.r-p1.r)*(p2[k]-p1[k])}}
function getV(id,uid){return (parseFloat(document.getElementById(id).value)||0)*(parseFloat(document.getElementById(uid).value)||1)}
function updateInputUnits() {
    const mode = document.getElementById('input-mode').value;
    const inUnit = document.getElementById('u-in-val');
    const outUnit = document.getElementById('ou-main');

    if (mode === 'mt') {
        inUnit.innerHTML = '<option value="1000000">kNm</option><option value="1000">Nm</option><option value="1">Nmm</option>';
        outUnit.innerHTML = '<option value="1">MPa</option><option value="1000000">Pa</option>';

    } else {
        inUnit.innerHTML = '<option value="1">MPa</option><option value="1000000">Pa</option>';
        outUnit.innerHTML = '<option value="1000000">kNm</option><option value="1000">Nm</option><option value="1">Nmm</option>';
    }
    calculate();
}

function generateRows() {
    const n = Math.max(1, Math.min(10, parseInt(document.getElementById('n_elem').value)||3));
    const cont = document.getElementById('dynamic-rows'); cont.innerHTML = '';
    for(let i=1; i<=n; i++) {
        cont.innerHTML += `<div class="grid grid-cols-12 gap-1 items-center bg-slate-900/40 p-1 rounded text-[10px]">
            <span class="col-span-1">L${i}</span><input type="number" id="Li_${i}" value="40" class="col-span-4 bg-slate-800 rounded p-1" oninput="calculate()">
            <select id="uLi_${i}" class="col-span-2 unit-select" onchange="calculate()"><option value="1">mm</option><option value="10">cm</option></select>
            <span class="col-span-1 text-right">v${i}</span><input type="number" id="vi_${i}" value="3" class="col-span-4 bg-slate-800 rounded p-1" oninput="calculate()">
        </div>`;
    }
    calculate();
}

function generateZartRows() {
    const n = Math.max(3, parseInt(document.getElementById('nz_elem').value)||4);
    const cont = document.getElementById('dynamic-zrows'); cont.innerHTML = '';
    for(let i=1; i<=n; i++) {
        cont.innerHTML += `<div class="grid grid-cols-12 gap-1 items-center bg-slate-900/40 p-1 rounded text-[10px]">
            <span class="col-span-1">L${i}</span><input type="number" id="zL_${i}" value="60" class="col-span-4 bg-slate-800 rounded p-1" oninput="calculate()">
            <select id="uzL_${i}" class="col-span-2 unit-select" onchange="calculate()"><option value="1">mm</option><option value="10">cm</option></select>
            <span class="col-span-1 text-right">v${i}</span><input type="number" id="zvi_${i}" value="2" class="col-span-4 bg-slate-800 rounded p-1" oninput="calculate()">
        </div>`;
    }
    calculate();
}

function updateUI() {
    const t = document.getElementById('type').value;
    ['div-D','div-d','div-a','div-b','div-open-spec','div-zart-spec'].forEach(id=>document.getElementById(id).classList.add('hidden'));
    if(t==='kor') document.getElementById('div-D').classList.remove('hidden');
    if(t==='gyuru'){ document.getElementById('div-D').classList.remove('hidden'); document.getElementById('div-d').classList.remove('hidden'); }
    if(t==='teglalap'){ document.getElementById('div-a').classList.remove('hidden'); document.getElementById('div-b').classList.remove('hidden'); }
    if(t==='nyitott'){ document.getElementById('div-open-spec').classList.remove('hidden'); if(!document.getElementById('dynamic-rows').innerHTML) generateRows(); }
    if(t==='zart'){ document.getElementById('div-zart-spec').classList.remove('hidden'); if(!document.getElementById('dynamic-zrows').innerHTML) generateZartRows(); }
    updateInputUnits();
}

function calculate() {
    const type = document.getElementById('type').value;
    const mode = document.getElementById('input-mode').value;
    const inputVal = getV('Mt_or_Tau', 'u-in-val');
    const G = getV('G_val','u-G'), L_rod = getV('L_rod', 'u-Lrod');
    let It = 0, Wt = 0, Mt = 0, Tau = 0;

    if(type==='kor'){ const D=getV('D','u-D'); It=(Math.PI*Math.pow(D,4))/32; Wt=It/(D/2); }
    else if(type==='gyuru'){ const D=getV('D','u-D'), d=getV('d_val','u-d'); It=(Math.PI*(Math.pow(D,4)-Math.pow(d,4)))/32; Wt=It/(D/2); }
    else if(type==='teglalap'){ const b_in=getV('a_val','u-a'), a_in=getV('b_val','u-b'), b=Math.max(a_in,b_in), a=Math.min(a_in,b_in), r=b/a; It=interp(r,'b')*b*Math.pow(a,3); Wt=interp(r,'a')*b*Math.pow(a,2); }
    else if(type==='nyitott'){

        let sum=0, maxV=0, n=parseInt(document.getElementById('n_elem').value);
        for(let i=1;i<=n;i++){ let L=getV(`Li_${i}`,`uLi_${i}`), v=parseFloat(document.getElementById(`vi_${i}`).value)||0; sum+=(L*v**3)/3; if(v>maxV) maxV=v; }
        It=sum*parseFloat(document.getElementById('eta0').value); Wt=It/(maxV||1);

    } else if(type==='zart'){
        let Ak=getV('Ak_in','u-Ak'), sum_lv=0, minV=Infinity, n=parseInt(document.getElementById('nz_elem').value);
        for(let i=1;i<=n;i++){ let L=getV(`zL_${i}`,`uzL_${i}`), v=parseFloat(document.getElementById(`zvi_${i}`).value)||1; sum_lv+=L/v; if(v<minV) minV=v; }
        It=(4*Ak*Ak)/sum_lv; Wt=2*Ak*minV;
    }

    const outUnitMult = parseFloat(document.getElementById('ou-main').value) || 1;
    if (mode === 'mt') {
        Mt = inputVal; Tau = Wt > 0 ? (Mt / Wt) : 0;
        document.getElementById('main-res-label').innerText = "Számított feszültség (τₘₐₓ)";
        document.getElementById('main-res-val').innerText = (Tau / outUnitMult).toFixed(4);
        document.getElementById('sec-res-label').innerText = "Bevitt Nyomaték (Mₜ)";
        document.getElementById('sec-res-val').innerText = (Mt/1000).toFixed(2) + " Nm";
    } else {
        Tau = inputVal; Mt = Tau * Wt;
        document.getElementById('main-res-label').innerText = "Számított Nyomaték (Mₜ)";
        document.getElementById('main-res-val').innerText = (Mt / outUnitMult).toFixed(4);
        document.getElementById('sec-res-label').innerText = "Bevitt Feszültség (τ)";
        document.getElementById('sec-res-val').innerText = Tau.toFixed(2) + " MPa";
    }
    const itUnit = parseFloat(document.getElementById('ou-it').value);
    document.getElementById('outIt').innerText = (It / itUnit).toLocaleString('hu-HU', {maximumFractionDigits: (itUnit > 1e11 ? 12 : 2)});
    let th = It > 0 ? Mt/(G*It) : 0;
    let uTh = document.getElementById('ou-th').value;
    let thDisp = th;
    if(uTh==='radm') thDisp*=1000; else if(uTh==='degm') thDisp*=1000*(180/Math.PI);
    document.getElementById('outTheta').innerText = thDisp.toFixed(8);
    let phiRad = th * L_rod;
    let uPhi = document.getElementById('ou-phi').value;
    document.getElementById('outPhi').innerText = (uPhi === 'deg' ? (phiRad * 180 / Math.PI) : phiRad).toFixed(6);
    draw(type);
}
function draw(type) {
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,400,400); ctx.lineWidth=3; ctx.strokeStyle='#4f46e5'; ctx.font="italic 14px Inter";
    const cx=200, cy=200;
    if(type==='kor'){ ctx.beginPath(); ctx.arc(cx,cy,70,0,Math.PI*2); ctx.stroke(); ctx.fillText("D",cx,cy-80); }
    else if(type==='gyuru'){ ctx.beginPath(); ctx.arc(cx,cy,75,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(cx,cy,45,0,Math.PI*2); ctx.stroke(); ctx.fillText("D",cx,cy-85); ctx.fillText("d",cx,cy-30); }
    else if(type==='nyitott'){ ctx.lineWidth=12; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(cx-80,cy-60); ctx.lineTo(cx-80,cy+60); ctx.lineTo(cx+60,cy+60); ctx.lineTo(cx+60,cy-20); ctx.stroke(); ctx.fillStyle="#6366f1"; ctx.fillText("L1, v1",cx-125,cy); ctx.fillText("L2, v2",cx-10,cy+80); ctx.fillText("L3, v3",cx+75,cy+20); }
    else if(type==='zart'){ ctx.setLineDash([5,5]); ctx.lineWidth=2; ctx.strokeRect(cx-70,cy-50,140,100); ctx.setLineDash([]); ctx.lineWidth=6; ctx.strokeRect(cx-75,cy-55,150,110); ctx.fillText("Ak",cx-10,cy); }
    else if(type==='teglalap'){ ctx.strokeRect(cx-100,cy-50,200,100); ctx.fillText("b",cx,cy-60); ctx.fillText("a",cx+110,cy); }
}
window.onload = updateUI;
</script>
</body>
</html>
